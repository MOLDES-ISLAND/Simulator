  <meta charset="UTF-8">

  <style>

    body {

      background-color: #1f1f1f;
      color: white;
      text-align: center;
      font-family: sans-serif;

      margin: 0;
      padding: 30px;

    }



    h1 {

      margin-bottom: 20px;

    }



    /* 전체 레이아웃 */
    #main-container {

      display: flex;

      justify-content: center;

      align-items: stretch;

      gap: 30px;

    }


    #gacha-screen {

      display: none;

    }


    /* 왼쪽 */
    #left-panel {

      display: flex;

      flex-direction: column;

      align-items: flex-start;

    }



    /* 버튼 영역 */
    #button-group {

      margin-bottom: 20px;

    }



    button {

      padding: 12px 24px;

      font-size: 18px;

      border: none;

      border-radius: 10px;

      cursor: pointer;

      margin: 5px;

    }



    /* 결과창 */
    #result {

      width: fit-content;

      display: grid;

      grid-template-columns: repeat(5, 150px);

      column-gap: 10px;

      row-gap: 10px;

      background-color: #2a2a2a;

      padding: 20px;

      border-radius: 15px;

      white-space: nowrap;

    }



    /* 카드 */
    .card {

      width: 150px;

      height: 300px;

      border-radius: 15px;

      overflow: hidden;

    }



    /* 이미지 */
    .card img {

      width: 150px;

      height: 300px;

      object-fit: cover;

      display: block;

    }



    /* 3성 */
    .three {

      background-color: white;

    }



    /* 4성 */
    .four {

      background-color: #a3a2f5;

    }



    /* 5성 */
    .five {

      background-color: #ffe680;

    }



    /* 6성 */
    .six {

      background-color: #ffd700;

    }



    /* 오른쪽 패널 */
    #right-panel {

      width: 300px;

      background-color: #2a2a2a;

      padding: 20px;

      border-radius: 15px;

      text-align: left;

    }



    /* 정보 영역 */
    #top-info {

      display: flex;

      justify-content: space-between;

      align-items: center;

      margin-bottom: 20px;

      font-size: 18px;

      font-weight: bold;

    }
    



    #pity {

      color: #ffd700;

    }



    /* 수집 목록 */
    #collection {

      margin-top: 20px;

      font-size: 20px;

      line-height: 1.8;

    }



    .section-title {

      margin-top: 20px;

      margin-bottom: 10px;

      font-size: 24px;

      font-weight: bold;

    }



    .six-text {

      color: #ffd700;

    }



    .five-text {

      color: #ffe680;

    }



    #six-list {

      color: #ffd700;

    }



    #five-list {

      color: #ffe680;

    }

    #current-banner {

      margin-top: 10px;

      font-size: 18px;

      color: #ffd700;

      font-weight: bold;

    }

    #button-group {

      width: 100%;

      margin-bottom: 20px;

    }

    #top-buttons {

      display: flex;

      justify-content: flex-start;

    #back-button {

        ]

    // =========================

    let pickup6 = [];

    let pickup5 = [];



    // =========================
    // 캐릭터 뽑기
    // =========================

    function drawCharacter() {

      let sixRate = 0.02;



      // 반천장
      if (pityStack >= 50) {

        sixRate =
          0.02 + ((pityStack - 49) * 0.02);

      }

      if (sixRate > 1) {

        sixRate = 1;

      }



      const rand = Math.random();

      let rarity = "";



      // 희귀도 결정
      if (rand < sixRate) {

        rarity = "6성";

      }

      else if (rand < sixRate + 0.08) {

        rarity = "5성";

      }

      else if (rand < sixRate + 0.58) {

        rarity = "4성";

      }

      else {

        rarity = "3성";

      }



      // 반천장 처리
      if (rarity == "6성") {

        pityStack = 0;

      }

      else {

        pityStack++;

      }

      updatePity();



      // =========================
      // 픽업 시스템
      // =========================

      let list = [];



      // 6성
      if (rarity == "6성") {

        const pickupChance = Math.random();

        if (pickupChance < 0.5) {

          list = characters["6성"].filter(
            character =>
              pickup6.includes(character.name)
          );

        }

        else {

          list = characters["6성"].filter(
            character =>
              !pickup6.includes(character.name)
          );

        }

      }



      // 5성
      else if (rarity == "5성") {

        const pickupChance = Math.random();

        if (pickupChance < 0.5) {

          list = characters["5성"].filter(
            character =>
              pickup5.includes(character.name)
          );

        }

        else {

          list = characters["5성"].filter(
            character =>
              !pickup5.includes(character.name)
          );

        }

      }



      // 4성 / 3성
      else {

        list = characters[rarity];

      }



      // 랜덤 선택
      const index =
        Math.floor(Math.random() * list.length);

      const character = list[index];



      // 수집 기록
      if (rarity == "6성") {

        addCollection(collection6, character.name);

      }

      else if (rarity == "5성") {

        addCollection(collection5, character.name);

      }



      // 색상 클래스
      let className = "";

      if (rarity == "6성") {

        className = "six";

      }

      else if (rarity == "5성") {

        className = "five";

      }

      else if (rarity == "4성") {

        className = "four";

      }

      else {

        className = "three";

      }



      // 결과 출력
      return `

        <div class="card ${className}">

          <img src="${character.image}">

        </div>

      `;

    }



    // =========================
    // 수집 기록 추가
    // =========================

    function addCollection(list, character) {

      for (let item of list) {

        if (item.name == character) {

          item.count++;

          return;

        }

      }

      list.push({

        name: character,

        count: 1

      });

    }



    // =========================
    // 수집 목록 업데이트
    // =========================

    function updateCollection() {

      let sixHTML = "";

      for (let item of collection6) {

        sixHTML += `
          <div>
            ${item.name} x${item.count}
          </div>
        `;

      }

      if (sixHTML == "") {

        sixHTML = "없음";

      }

      document.getElementById("six-list").innerHTML =
        sixHTML;



      let fiveHTML = "";

      for (let item of collection5) {

        fiveHTML += `
          <div>
            ${item.name} x${item.count}
          </div>
        `;

      }

      if (fiveHTML == "") {

        fiveHTML = "없음";

      }

      document.getElementById("five-list").innerHTML =
        fiveHTML;

    }

    // =========================

    }



    // =========================
    // 1회 뽑기
    // =========================

    function gacha() {

      totalCount++;

      updateCount();

      const result = drawCharacter();

      updateCollection();

      document.getElementById("result").innerHTML =
        result;

    }



    // =========================
    // 10회 뽑기

    function gacha10() {

      let results = "";

      for (let i = 0; i < 10; i++) {

        totalCount++;

        results += drawCharacter();

      }

      updateCount();

      updateCollection();

      document.getElementById("result").innerHTML =
        results;

    }



    // =========================
    // 초기화
    // =========================

    function resetGacha() {

      totalCount = 0;

      pityStack = 0;

      collection6 = [];

      collection5 = [];

      updateCount();

      updatePity();

      updateCollection();

      document.getElementById("result").innerHTML =
        "결과가 초기화되었습니다.";

    }


    function selectBanner(bannerName) {

      const banner = banners[bannerName];

      pickup6 = banner.pickup6;

      pickup5 = banner.pickup5;

      resetGacha();



      // 현재 픽업 표시
      document.getElementById("current-banner")
        .innerText =

        "현재 픽업 : "
        + banner.name



      // 화면 전환
      document.getElementById("banner-screen")
        .style.display = "none";

      document.getElementById("notice-box").style.display = "none";


      document.getElementById("gacha-screen")
        .style.display = "block";

    }


    function goToBannerSelect() {

      document.getElementById("gacha-screen")
        .style.display = "none";

      document.getElementById("notice-box").style.display = "block";


      document.getElementById("banner-screen")
        .style.display = "block";

    }
